<!DOCTYPE html>
<html>
<head>
    <title>Images with Captions</title>
</head>
<body>

    <h2>Nature Gallery</h2>

    <figure>
        <img src="nature1.jpg" alt="Mountain" width="300">
        <figcaption>Beautiful Mountain View</figcaption>
    </figure>

    <figure>
        <img src="nature2.jpg" alt="Beach" width="300">
        <figcaption>Peaceful Beach Scene</figcaption>
    </figure>

    <figure>
        <img src="nature3.jpg" alt="Forest" width="300">
        <figcaption>Green Forest Landscape</figcaption>
    </figure>

</body>
</html>
